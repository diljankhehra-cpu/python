name: Auto Splitting Folder Scanner

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: 'Start ID'
        required: true
        default: '10000'
      end_id:
        description: 'End ID'
        required: true
        default: '13000'

permissions: write-all

jobs:
  scan_and_commit:
    runs-on: ubuntu-latest

    steps:
    - name: Code Fetch Karo
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: System Dependencies (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Python Packages Install Karo
      run: pip install requests

    - name: Script Nu Run Karo
      env:
        START_ID: ${{ github.event.inputs.start_id }}
        END_ID: ${{ github.event.inputs.end_id }}
      run: python bulk_extractor.py

    - name: Save to GitHub Repository
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # ਪੁਰਾਣੀ ਫਸੀ ਹੋਈ ਜ਼ਿਪ ਨੂੰ ਹਟਾਓ
        rm -f channel_screenshots.zip
        git rm --cached channel_screenshots.zip || true
        
        # ਗਿਟਹੱਬ ਦੇ ਸਿਸਟਮ ਨੂੰ ਰਿਫ੍ਰੈਸ਼ ਕਰਨ ਲਈ 5 ਸੈਕਿੰਡ ਰੁਕੋ
        sleep 5
        
        # channels.txt ਨੂੰ ਐਡ ਕਰੋ
        if [ -f channels.txt ]; then
          git add channels.txt
        fi
        
        # ਸਾਰੇ ਬਣੇ ਹੋਏ ਫੋਲਡਰਾਂ ਨੂੰ ਜ਼ਬਰਦਸਤੀ ਐਡ ਕਰੋ
        git add screenshots_part* || true
        
        if ! git diff-index --quiet HEAD; then
          git commit -m "Force saved screenshots in automatic 50MB split folders"
          git pull --rebase origin main
          git push origin main
        else
          echo "No changes to commit"
        fi
