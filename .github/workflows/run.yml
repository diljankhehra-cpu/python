name: Crop OCR Stream Scanner

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: 'Start ID'
        required: true
        default: '1000'
      end_id:
        description: 'End ID'
        required: true
        default: '1050'

permissions: write-all

jobs:
  scan_and_commit:
    runs-on: ubuntu-latest

    steps:
    - name: Code Fetch Karo
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0 # Poori history chkko taan jo rebase sahi hove

    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: System Dependencies (FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: EasyOCR Models Cache Setup
      uses: actions/cache@v4
      with:
        path: ~/.EasyOCR/model
        key: ${{ runner.os }}-easyocr-models-en

    - name: Python Packages Install Karo
      run: |
        pip install requests easyocr pillow torch torchvision --extra-index-url https://download.pytorch.org/whl/cpu

    - name: Script Nu Run Karo
      env:
        START_ID: ${{ github.event.inputs.start_id }}
        END_ID: ${{ github.event.inputs.end_id }}
      run: python bulk_extractor.py

    # --- UPDATED PUSH SECTION WITH REBASE ---
    - name: Save to GitHub Repository
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Pehla files add karo
        git add channels.txt
        
        # Je koi badlaav hoya hai taan hi commit karo
        if ! git diff-index --quiet HEAD; then
          git commit -m "Updated channels.txt with Crop OCR IDs ${{ github.event.inputs.start_id }}-${{ github.event.inputs.end_id }}"
          
          # Pakka hal: Push karan ton pehla rebase pull karo taan jo conflict na aave
          git pull --rebase origin main
          
          # Hun final push karo
          git push origin main
        else
          echo "No changes to commit"
        fi
