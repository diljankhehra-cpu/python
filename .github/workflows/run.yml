name: Auto M3U Generator

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: 'Kithon shuru karna (Start ID)'
        required: true
        default: '666'
      end_id:
        description: 'Kithe khatam karna (End ID)'
        required: true
        default: '3000' # Hun assi vaddi range chala sakde han kyonki script fast hai

jobs:
  generate:
    runs-runs-on: ubuntu-latest

    steps:
    - name: Code Fetch Karo
      uses: actions/checkout@v4

    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Requests Install Karo
      run: pip install requests

    - name: Script Nu Run Karo
      env:
        START_ID: ${{ github.event.inputs.start_id }}
        END_ID: ${{ github.event.inputs.end_id }}
      run: python bulk_extractor.py

    - name: M3U Playlist Nu Upload Karo
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: m3u-playlist-${{ github.event.inputs.start_id }}-to-${{ github.event.inputs.end_id }}
        path: playlist.m3u
