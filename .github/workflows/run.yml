name: Accurate Stream Metadata Scanner

on:
  workflow_dispatch:
    inputs:
      start_id:
        description: 'Start ID'
        required: true
        default: '666'
      end_id:
        description: 'End ID'
        required: true
        default: '1200' # Hun tusi 500-600 IDs 1 mint ch scan kar ਸਕਦੇ ਹੋ

permissions: write-all

jobs:
  scan_and_commit:
    runs-on: ubuntu-latest

    steps:
    - name: Code Fetch Karo
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Python Setup
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Python Packages Install Karo
      run: pip install requests

    - name: Script Nu Run Karo
      env:
        START_ID: ${{ github.event.inputs.start_id }}
        END_ID: ${{ github.event.inputs.end_id }}
      run: python bulk_extractor.py

    - name: Save to GitHub Repository
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add channels.txt
        git diff-index --quiet HEAD || git commit -m "Updated channels.txt with Accurate IDs ${{ github.event.inputs.start_id }}-${{ github.event.inputs.end_id }}"
        git push origin main
